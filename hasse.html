<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAPDAG - Capability Hasse Diagram</title>
    <meta name="description" content="Hasse diagram of CAPDAG capabilities based on capability acceptance ordering.">

    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2260%22 font-family=%22monospace%22>cap</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles/main.css">
</head>
<body class="fullscreen-graph-mode">
    <header class="floating-header">
        <a href="/browse" class="header-brand">
            <span class="brand-text" id="brand-text">cap: Hasse</span>
        </a>
        <nav class="header-nav">
            <a href="/browse" class="nav-link nav-link-desktop">Main Graph</a>
            <a href="/docs.html" class="nav-link nav-link-desktop">Docs</a>
            <a href="/dashboard" class="nav-link nav-link-accent nav-link-desktop">Sign In</a>
            <button class="theme-toggle nav-link-desktop" id="theme-toggle" title="Toggle theme">
                <svg class="theme-icon-dark" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                </svg>
                <svg class="theme-icon-light" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="5"/>
                    <line x1="12" y1="1" x2="12" y2="3"/>
                    <line x1="12" y1="21" x2="12" y2="23"/>
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                    <line x1="1" y1="12" x2="3" y2="12"/>
                    <line x1="21" y1="12" x2="23" y2="12"/>
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                </svg>
            </button>
            <button class="hamburger-btn" id="hamburger-btn" title="Menu">
                <svg class="hamburger-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="3" y1="6" x2="21" y2="6"/>
                    <line x1="3" y1="12" x2="21" y2="12"/>
                    <line x1="3" y1="18" x2="21" y2="18"/>
                </svg>
                <svg class="close-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="18" y1="6" x2="6" y2="18"/>
                    <line x1="6" y1="6" x2="18" y2="18"/>
                </svg>
            </button>
        </nav>
        <div class="mobile-menu" id="mobile-menu">
            <a href="/browse" class="mobile-menu-link">Main Graph</a>
            <a href="/docs.html" class="mobile-menu-link">Docs</a>
            <a href="/dashboard" class="mobile-menu-link mobile-menu-link-accent">Sign In</a>
            <button class="mobile-menu-link mobile-theme-toggle" id="mobile-theme-toggle">
                <span class="theme-label-dark">Light Mode</span>
                <span class="theme-label-light">Dark Mode</span>
            </button>
        </div>
    </header>

    <div id="cap-graph" class="fullscreen-graph cap-graph-loading"></div>

    <div id="hasse-summary" style="position: fixed; left: 12px; bottom: 12px; z-index: 90; background: var(--bg-overlay); color: var(--text-secondary); border: 1px solid var(--border-primary); border-radius: 8px; padding: 8px 10px; font: 11px/1.3 var(--font-mono); pointer-events: none;">
        Loading Hasse diagram...
    </div>

    <script src="https://cdn.jsdelivr.net/npm/cytoscape@3.28.1/dist/cytoscape.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/elkjs@0.9.2/lib/elk.bundled.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/cytoscape-elk@2.2.0/dist/cytoscape-elk.min.js"></script>
    <script src="/scripts/tagged-urn.js"></script>
    <script src="/scripts/capdag.js"></script>
    <script src="/scripts/cap-hasse-graph.js"></script>
    <script>
        cytoscape.use(cytoscapeElk);

        const themeToggle = document.getElementById('theme-toggle');
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)');

        function setTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
        }

        function getStoredTheme() {
            return localStorage.getItem('theme') || (prefersDark.matches ? 'dark' : 'light');
        }

        setTheme(getStoredTheme());

        themeToggle.addEventListener('click', () => {
            const current = document.documentElement.getAttribute('data-theme') || 'dark';
            setTheme(current === 'dark' ? 'light' : 'dark');
        });

        const mobileThemeToggle = document.getElementById('mobile-theme-toggle');
        if (mobileThemeToggle) {
            mobileThemeToggle.addEventListener('click', () => {
                const current = document.documentElement.getAttribute('data-theme') || 'dark';
                setTheme(current === 'dark' ? 'light' : 'dark');
            });
        }

        const hamburgerBtn = document.getElementById('hamburger-btn');
        const mobileMenu = document.getElementById('mobile-menu');

        if (hamburgerBtn && mobileMenu) {
            hamburgerBtn.addEventListener('click', () => {
                hamburgerBtn.classList.toggle('active');
                mobileMenu.classList.toggle('active');
            });

            document.addEventListener('click', (e) => {
                if (!hamburgerBtn.contains(e.target) && !mobileMenu.contains(e.target)) {
                    hamburgerBtn.classList.remove('active');
                    mobileMenu.classList.remove('active');
                }
            });
        }

        (async function init() {
            const graphContainer = document.getElementById('cap-graph');
            const summary = document.getElementById('hasse-summary');

            try {
                const response = await fetch('/api/capabilities');
                if (!response.ok) throw new Error('Failed to fetch capabilities');

                const capabilities = await response.json();
                if (!Array.isArray(capabilities)) {
                    throw new Error('API response is not an array');
                }

                graphContainer.classList.remove('cap-graph-loading');

                if (capabilities.length === 0) {
                    graphContainer.innerHTML = '<div class="cap-graph-empty"><p>No capabilities registered yet</p></div>';
                    summary.textContent = 'No capabilities available.';
                    return;
                }

                const hasse = new CapHasseVisualization('cap-graph', {
                    width: window.innerWidth,
                    height: window.innerHeight
                });

                hasse.buildFromCapabilities(capabilities);
                hasse.render();

                const parts = [`${hasse.nodes.length} caps`, `${hasse.edges.length} cover edges`];
                if (hasse.minRank !== hasse.maxRank) {
                    parts.push(`ranks ${hasse.minRank}\u2013${hasse.maxRank}`);
                }
                if (hasse.hiddenHubs.length > 0) {
                    const names = hasse.hiddenHubs.map((h) => h.label).join(', ');
                    parts.push(`${hasse.hiddenHubs.length} universal hub${hasse.hiddenHubs.length > 1 ? 's' : ''} hidden (${names})`);
                }
                summary.textContent = parts.join(', ') + '.';

                window.addEventListener('resize', () => {
                    if (hasse.cy) {
                        hasse.cy.resize();
                        hasse.cy.fit(undefined, 60);
                    }
                });
            } catch (error) {
                console.error('Error loading Hasse diagram:', error);
                graphContainer.classList.remove('cap-graph-loading');
                graphContainer.innerHTML = '<div class="cap-graph-empty"><p>Could not load capabilities</p></div>';
                summary.textContent = 'Failed to load capabilities.';
            }
        })();
    </script>
</body>
</html>
