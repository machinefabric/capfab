# LLM Text Generation Capability Definition - Candle Backend

title = "Generate Text with LLM (Candle)"
cap_description = "Generate text using Candle transformer models (Mistral/Llama safetensors)"
command = "run_inference"

urn = 'cap:candle;in="media:textable";llm;ml-model;op=generate_text;out="media:textable"'

[[args]]
media_urn = "media:textable"
required = true
arg_description = "Input text prompt for generation"
sources = [
    { stdin = "media:textable" },
    { position = 0 }
]

[[args]]
media_urn = "media:model-spec;candle;textable;llm"
required = false
arg_description = "Candle model specification (HuggingFace repo with safetensors)"
default_value = "hf:mistralai/Mistral-7B-Instruct-v0.3"
sources = [
    { cli_flag = "--model-spec" }
]

[[args]]
media_urn = "media:max-tokens;textable;numeric"
required = false
arg_description = "Maximum number of tokens to generate"
default_value = 512
sources = [
    { cli_flag = "--max-tokens" }
]

[[args]]
media_urn = "media:temperature;textable;numeric"
required = false
arg_description = "Sampling temperature (0.0-2.0)"
default_value = 0.7
sources = [
    { cli_flag = "--temperature" }
]

[[args]]
media_urn = "media:top-k;textable;numeric"
required = false
arg_description = "Top-k sampling parameter"
default_value = 40
sources = [
    { cli_flag = "--top-k" }
]

[[args]]
media_urn = "media:top-p;textable;numeric"
required = false
arg_description = "Top-p (nucleus) sampling parameter"
default_value = 0.9
sources = [
    { cli_flag = "--top-p" }
]

[[args]]
media_urn = "media:seed;textable;numeric"
required = false
arg_description = "Random seed for reproducibility"
default_value = 42
sources = [
    { cli_flag = "--seed" }
]

[output]
media_urn = "media:textable"
output_description = "Generated text streamed as raw text chunks"
