# Model Spec media specs — generic and backend/use-case specific variants

[[media_spec]]
urn = "media:model-spec;textable"
media_type = "text/plain"
title = "Model Spec"
profile_uri = "https://capdag.com/schema/model_spec"
description = "Model specification (HuggingFace repo or local path). Backend-agnostic."
[media_spec.validation]
max_length = 512
min_length = 1
pattern = ".*:.*"

# --- GGUF backend ---

[[media_spec]]
urn = "media:model-spec;gguf;textable;vision"
media_type = "text/plain"
title = "GGUF Vision Model Spec"
profile_uri = "https://capdag.com/schema/model_spec"
description = "GGUF vision model specification for image description."
[media_spec.metadata]
default = "hf:ggml-org/moondream2-20250414-GGUF"
[media_spec.validation]
max_length = 512
min_length = 1
pattern = ".*:.*"

[[media_spec]]
urn = "media:model-spec;gguf;textable;llm"
media_type = "text/plain"
title = "GGUF LLM Model Spec"
profile_uri = "https://capdag.com/schema/model_spec"
description = "GGUF language model specification for text generation and inference."
[media_spec.metadata]
default = "hf:MaziyarPanahi/Mistral-7B-Instruct-v0.3-GGUF?include=*Q8_0*,*.json&exclude=*IQ1*,*IQ2*,*IQ3*,*Q2*,*Q3*"
[media_spec.validation]
max_length = 512
min_length = 1
pattern = ".*:.*"

[[media_spec]]
urn = "media:model-spec;gguf;textable;embeddings"
media_type = "text/plain"
title = "GGUF Embeddings Model Spec"
profile_uri = "https://capdag.com/schema/model_spec"
description = "GGUF model specification for embedding vector generation."
[media_spec.metadata]
default = "hf:nomic-ai/nomic-embed-text-v1.5-GGUF"
[media_spec.validation]
max_length = 512
min_length = 1
pattern = ".*:.*"

