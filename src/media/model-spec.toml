# Model Spec media specs — generic and backend/use-case specific variants

[[media_spec]]
urn = "media:model-spec;textable"
media_type = "text/plain"
title = "Model Spec"
profile_uri = "https://capdag.com/schema/model_spec"
description = "Model specification (HuggingFace repo or local path). Backend-agnostic."
[media_spec.validation]
max_length = 512
min_length = 1
pattern = ".*:.*"

