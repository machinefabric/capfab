# Embedding Vector - output from embedding generation
urn = "media:embedding-vector;textable;record"
media_type = "application/json"
title = "Embedding Vector"
profile_uri = "https://capdag.com/schema/embedding-vector"
description = "Output from embedding generation including vectors, chunk metadata, and model information"

[schema]
type = "object"
required = ["success", "model_name", "embedding_dim", "total_chunks", "results"]

[schema.properties.success]
type = "boolean"
description = "Whether embedding generation succeeded"

[schema.properties.model_name]
type = "string"
description = "Model used for embedding generation"

[schema.properties.embedding_dim]
type = "integer"
description = "Dimension of each embedding vector"

[schema.properties.total_chunks]
type = "integer"
description = "Total number of chunks processed"

[schema.properties.results]
type = "array"
description = "Embedding results for each chunk"

[schema.properties.results.items]
type = "object"

[schema.properties.results.items.properties.chunk]
type = "object"
description = "The document chunk this embedding is for"

[schema.properties.results.items.properties.chunk.properties.chunk_index]
type = "integer"
description = "Index of this chunk in the document"

[schema.properties.results.items.properties.chunk.properties.text]
type = "string"
description = "Text content of the chunk"

[schema.properties.results.items.properties.chunk.properties.start_offset]
type = "integer"
description = "Start byte offset in original document"

[schema.properties.results.items.properties.chunk.properties.end_offset]
type = "integer"
description = "End byte offset in original document"

[schema.properties.results.items.properties.embedding]
type = "array"
description = "The embedding vector (array of floats)"

[schema.properties.results.items.properties.embedding.items]
type = "number"
