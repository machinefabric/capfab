[[media_spec]]
# JSON object media spec
urn = "media:json;textable;record"
media_type = "application/json"
title = "JSON Object"
profile_uri = "https://capdag.com/schema/json"
description = "JSON formatted object document"
extensions = ["json"]

[[media_spec]]
# JSON scalar media spec (single value or object)
urn = "media:json;textable"
media_type = "application/json"
title = "JSON Value"
profile_uri = "https://capdag.com/schema/json"
description = "Single JSON value - can be object, string, number, boolean, or null"
extensions = ["json"]

[[media_spec]]
# JSON array media spec
urn = "media:json;textable;list"
media_type = "application/json"
title = "JSON Array"
profile_uri = "https://capdag.com/schema/json"
description = "JSON array containing multiple values or objects"
extensions = ["json"]
