<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAPDAG Registry - Admin Panel</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2270%22>cap:</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles/main.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <span class="logo-text">CAPDAG Registry - Admin</span>
            </div>
            <div class="nav-links">
                <a href="/browse" class="nav-link">Back to Registry</a>
                <button onclick="logout()" class="nav-link logout-btn">Logout</button>
            </div>
        </div>
    </nav>

    <main class="admin-main">
        <!-- Authentication Section -->
        <section id="auth-section" class="auth-section">
            <div class="auth-container">
                <div class="auth-card">
                    <h1>Admin Access</h1>
                    <p>Enter admin credentials to manage the CAPDAG registry.</p>
                    <form onsubmit="login(event)" class="auth-form">
                        <div class="form-group">
                            <label for="admin-key">Admin Key:</label>
                            <input type="password" id="admin-key" required class="form-input">
                        </div>
                        <button type="submit" class="primary-button">Access Admin Panel</button>
                    </form>
                    <div id="auth-error" class="error-message" style="display: none;"></div>
                </div>
            </div>
        </section>

        <!-- Admin Panel -->
        <section id="admin-panel" class="admin-panel" style="display: none;">
            <div class="admin-container">
                
                <!-- Add New Capability -->
                <div class="admin-section">
                    <div class="section-header">
                        <h2>Add New Capability</h2>
                    </div>
                    <form onsubmit="addCapability(event)" class="capability-form">
                        <div class="form-grid">
                            <div class="form-group">
                                <label for="capurn">CAPURN:</label>
                                <input type="text" id="capurn" placeholder="cap:op=generate;format=pdf" required class="form-input">
                                <div class="form-hint">Format: cap:key1=value1;key2=value2</div>
                            </div>
                            
                            <div class="form-group full-width">
                                <label for="description">Description:</label>
                                <textarea id="description" placeholder="Describe what this capability does" class="form-textarea"></textarea>
                            </div>
                            
                            <div class="form-group">
                                <label for="command">Command:</label>
                                <input type="text" id="command" placeholder="command-name" required class="form-input">
                            </div>
                            
                            <div class="form-group">
                                <label for="stdin">STDIN Media URN (leave empty if cap doesn't accept stdin):</label>
                                <input type="text" id="stdin" placeholder="e.g., media:pdf;bytes" class="form-input">
                            </div>
                        </div>
                        
                        <div class="form-section">
                            <h3>Arguments</h3>
                            <div id="arguments-container">
                                <div class="argument-group">
                                    <input type="text" placeholder="Argument name" class="arg-name form-input">
                                    <select class="arg-type form-input">
                                        <option value="String">String</option>
                                        <option value="Integer">Integer</option>
                                        <option value="Float">Float</option>
                                        <option value="Boolean">Boolean</option>
                                        <option value="File">File</option>
                                    </select>
                                    <input type="text" placeholder="Description" class="arg-description form-input">
                                    <input type="text" placeholder="CLI flag (e.g., --input)" class="arg-cli-flag form-input">
                                    <button type="button" onclick="removeArgument(this)" class="remove-btn">Remove</button>
                                </div>
                            </div>
                            <button type="button" onclick="addArgument()" class="secondary-button">Add Argument</button>
                        </div>
                        
                        <div class="form-section">
                            <h3>Output (Optional)</h3>
                            <div class="form-row">
                                <div class="form-group">
                                    <label for="output-type">Type:</label>
                                    <select id="output-type" class="form-input">
                                        <option value="">None</option>
                                        <option value="String">String</option>
                                        <option value="File">File</option>
                                        <option value="JSON">JSON</option>
                                    </select>
                                </div>
                                <div class="form-group">
                                    <label for="output-format">Format:</label>
                                    <input type="text" id="output-format" placeholder="application/json" class="form-input">
                                </div>
                            </div>
                        </div>
                        
                        <div class="form-actions">
                            <button type="submit" class="primary-button">Add Capability</button>
                        </div>
                    </form>
                </div>

                <!-- Registry Management -->
                <div class="admin-section">
                    <div class="section-header">
                        <h2>Registry Management</h2>
                        <div>
                            <button onclick="resetToStandardCapabilities()" class="secondary-button" style="margin-right: 10px; background-color: var(--warning);">Reset to Standards</button>
                            <button onclick="loadCapabilitiesAdmin()" class="secondary-button">Refresh</button>
                        </div>
                    </div>
                    <div id="admin-capabilities-list" class="admin-capabilities-list">
                        <div class="loading">Loading capabilities...</div>
                    </div>
                </div>

            </div>
        </section>
    </main>
    
    <script src="/scripts/admin.js"></script>
</body>
</html>
